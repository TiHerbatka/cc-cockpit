<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>cc-cockpit</title>
  <link rel="stylesheet" href="/vendor/xterm.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="sidebar">
    <h1>cc-cockpit</h1>
    <ul id="session-list"></ul>
    <button id="add-btn">+ New session</button>
    <button id="resume-btn">Resume…</button>
    <div id="error" class="error"></div>
  </div>
  <div id="main">
    <div id="session-head">
      <span id="head-state" class="icon"></span>
      <span id="head-label"></span>
      <span id="usage-chip" class="usage-chip" title="Context / 5h / 7d usage"></span>
      <button id="interrupt-btn" title="Interrupt (Esc)" hidden>⛔ Stop</button>
      <span id="claude-mode" class="mode-chip" title="Claude permission mode — click to cycle (Shift+Tab)">–</span>
      <button id="open-docs" class="doc-btn" title="Open local-docs.md">📄 Docs</button>
      <button id="open-todo" class="doc-btn" title="Open TODO.md">✓ TODO</button>
      <span id="mode-switch">
        <button data-mode="gui" class="active">GUI</button>
        <button data-mode="terminal">Terminal</button>
      </span>
    </div>
    <div id="content">
      <div id="terminal"></div>
      <div id="gui-pane" hidden></div>
    </div>
  </div>
  <div id="error-center">
    <button id="error-toggle" title="GUI errors" hidden>⚠ <span id="error-count">0</span></button>
    <div id="error-panel" hidden>
      <div class="error-panel-head"><span>GUI errors (<span id="error-count2">0</span>)</span><span><button id="error-clear">clear</button> <button id="error-close">✕</button></span></div>
      <ul id="error-list"></ul>
    </div>
  </div>
  <script src="/vendor/xterm.js"></script>
  <script src="/vendor/addon-fit.js"></script>
  <script src="/modeparse.js"></script>
  <script src="/usageparse.js"></script>
  <script src="/gui.js"></script>
  <script src="/app.js"></script>
</body>
</html>
